<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#070a10" />
<meta name="description" content="Database item Lineage Classic - cari, filter, dan lihat detail item" />
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Lineage Classic</title>
<style>
:root{
  --bg:#05070b;--bg2:#090d14;--card:#101722;--card2:#151e2c;--text:#f8f1df;--muted:#aeb8ca;--dim:#788397;
  --line:rgba(255,255,255,.105);--gold:#d9b96e;--gold2:#fff0b8;--blue:#78c7ff;--green:#89e7a2;--red:#ff8585;
  --shadow:0 20px 60px rgba(0,0,0,.38);--radius:22px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{margin:0;min-height:100vh;overflow-x:hidden;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#05070b}
body:before{content:"";position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 14% -12%,rgba(217,185,110,.25),transparent 30%),radial-gradient(circle at 94% 0,rgba(120,199,255,.14),transparent 32%),linear-gradient(180deg,#0d121b 0%,#05070b 52%,#030408 100%)}
body:after{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(180deg,rgba(0,0,0,.75),transparent 84%)}
button,input,select{font:inherit}
button{cursor:pointer;color:inherit}
.wrap{width:min(1180px,calc(100% - 28px));margin-inline:auto}
.hero{padding:18px 0 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(5,7,11,.96),rgba(5,7,11,.78));backdrop-filter:blur(16px)}
.brand{display:flex;gap:14px;align-items:center}
.logo{width:56px;height:56px;flex:0 0 56px;border-radius:19px;display:grid;place-items:center;background:linear-gradient(135deg,#211609,#d9b96e 58%,#fff1bd);color:#171109;font-weight:1000;font-size:21px;letter-spacing:-1.6px;box-shadow:0 0 36px rgba(217,185,110,.22)}
h1{margin:0;font-size:clamp(32px,5.2vw,58px);line-height:.94;letter-spacing:-2.2px}
.sub{margin:8px 0 0;color:var(--muted);font-weight:650}
.dock{position:sticky;top:0;z-index:20;padding:10px 0;background:linear-gradient(180deg,rgba(5,7,11,.98),rgba(5,7,11,.86));backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
.searchbar{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
.search{position:relative}
.search input{width:100%;height:48px;padding:0 44px 0 16px;border:1px solid var(--line);border-radius:17px;outline:none;color:var(--text);background:rgba(255,255,255,.055)}
.search input:focus{border-color:rgba(217,185,110,.55);box-shadow:0 0 0 4px rgba(217,185,110,.09)}
.clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:12px;background:rgba(255,255,255,.07);display:none}
.search.has-value .clear{display:block}
.select,.viewbtn,.favbtn{height:48px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.055);color:var(--text);padding:0 12px;outline:none}
.select option{background:#111827;color:#fff}
.viewbtn,.favbtn{min-width:48px;font-weight:900}
.favbtn.active{color:#171109;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent}
.chips{display:flex;gap:8px;overflow:auto;padding:10px 1px 2px;scrollbar-width:thin;scrollbar-color:rgba(217,185,110,.55) transparent}
.chips::-webkit-scrollbar{height:5px}.chips::-webkit-scrollbar-thumb{background:rgba(217,185,110,.55);border-radius:99px}
.chip{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.052);border-radius:999px;padding:9px 12px;font-weight:850;font-size:13px;color:var(--muted)}
.chip.active{color:#171109;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
.stat{border:1px solid var(--line);border-radius:18px;padding:14px;background:rgba(255,255,255,.045);box-shadow:0 12px 34px rgba(0,0,0,.18)}
.stat b{display:block;font-size:24px}.stat span{color:var(--muted);font-weight:700;font-size:12px}
.resultbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:16px 0 10px;color:var(--muted);font-weight:750}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding-bottom:28px}
.card{position:relative;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.068),rgba(255,255,255,.032));box-shadow:var(--shadow);padding:14px;min-width:0;transition:.18s ease;overflow:hidden}
.card:hover{transform:translateY(-2px);border-color:rgba(217,185,110,.35)}
.card:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.75}
.top{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:center}
.icon{width:54px;height:54px;border-radius:17px;background:#070a10;border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;overflow:hidden;box-shadow:inset 0 0 16px rgba(0,0,0,.45)}
.icon img{width:100%;height:100%;object-fit:contain;image-rendering:auto;padding:4px}
.fallbackIcon{font-weight:1000;color:var(--gold)}
.title{min-width:0}.name{font-size:18px;font-weight:950;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pill{font-size:11px;font-weight:850;color:#dce6f8;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.055);padding:5px 8px;border-radius:999px}
.pill.gold{color:#171109;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent}
.favstar{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.35);font-size:16px;display:grid;place-items:center;z-index:2}
.favstar.active{color:var(--gold2);border-color:rgba(217,185,110,.55);background:rgba(217,185,110,.16)}
.desc{margin:12px 0 12px;color:var(--muted);line-height:1.47;min-height:42px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.info{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.info div{border:1px solid rgba(255,255,255,.075);border-radius:14px;padding:9px;background:rgba(0,0,0,.14);min-width:0}
.info small{display:block;color:var(--dim);font-weight:800;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.info span{display:block;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:750;font-size:13px}
.actions{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.065);height:40px;font-weight:900}
.btn.primary{color:#171109;background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent}
.grid.list{grid-template-columns:1fr}
.grid.list .card{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.grid.list .desc{min-height:0;-webkit-line-clamp:1;margin-bottom:0}
.grid.list .info{grid-template-columns:repeat(3,minmax(110px,1fr));margin:0}
.grid.list .favstar{position:static;margin-left:8px}
.empty{display:none;text-align:center;padding:34px 14px;border:1px dashed var(--line);border-radius:22px;color:var(--muted);background:rgba(255,255,255,.035)}
.empty.show{display:block}
.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(25px);opacity:0;pointer-events:none;background:#111827;color:#fff;border:1px solid var(--line);border-radius:999px;padding:11px 15px;font-weight:850;box-shadow:var(--shadow);z-index:60;transition:.2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.66);padding:18px}
.modal.show{display:flex}
.sheet{width:min(760px,100%);max-height:86vh;overflow:auto;border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,#121a27,#070a10);box-shadow:0 30px 90px rgba(0,0,0,.55);padding:18px}
.sheetHead{display:flex;gap:12px;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
.sheetTitle{display:flex;gap:12px;align-items:center;min-width:0}
.close{width:42px;height:42px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.06);font-size:20px}
.detailText{white-space:pre-wrap;line-height:1.56;color:#dbe4f3;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:14px}
.footer{color:var(--dim);font-weight:700;text-align:center;padding:0 0 28px}
@media (max-width:920px){.grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}}
@media (max-width:640px){.wrap{width:min(100% - 22px,1180px)}.hero{padding-top:14px}.logo{width:50px;height:50px;flex-basis:50px;border-radius:17px}.searchbar{grid-template-columns:1fr auto auto}.select{grid-column:1/-1;width:100%}.stats{grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.stat{padding:11px}.stat b{font-size:20px}.grid{grid-template-columns:1fr;gap:12px;padding-top:4px}.grid.list .card{display:block}.grid.list .info{grid-template-columns:1fr 1fr 1fr;margin:10px 0}.chips{padding-bottom:5px}.card{border-radius:20px;padding:13px}.modal{padding:10px}.sheet{max-height:88vh;border-radius:22px;padding:14px}}
</style>
</head>
<body>
<header class="hero">
  <div class="wrap brand">
    <div class="logo">LC</div>
    <div>
      <h1>Lineage Classic</h1>
      <p class="sub">Item database for Lineage Classic.</p>
    </div>
  </div>
</header>
<section class="dock">

      <button class="viewbtn" id="viewBtn" title="Ganti tampilan">▦</button>

    <div class="chips" id="chips"></div>

</section>
<main class="wrap">
  <div class="stats" id="stats"></div>
  <div class="resultbar"><span id="count">Loading...</span><span id="hint">Klik detail untuk lihat info lengkap</span></div>
  <div class="empty" id="empty">Tidak ada item yang cocok.</div>
  <section class="grid" id="grid"></section>
</main>
<footer class="footer">Made by Fajar</footer>

ces/ItemIcon/20348.png","options":["Pulih MP +1"],"description":"","categoryName":"Cincin","parent":"Aksesori"},{"id":12860,"name":"Cincin Pengetahuan","name2":null,"image":"https://assets.playnccdn.com/static-lineageclassic-gamedata/resources/ItemIcon/5343.png","options":["INT +1"],"description":"","categoryName":"Cincin","parent":"Aksesori"},{"id":15384,"name":"Cincin Kekuatan","name2":null,"image":"https://assets.playnccdn.com/static-lineageclassic-gamedata/resources/ItemIcon/6488.png","options":["STR +1"],"description":"","categoryName":"Cincin","parent":"Aksesori"},{"id":15385,"name":"Cincin Kecekatan","name2":null,"image":"https://assets.playnccdn.com/static-lineageclassic-gamedata/resources/ItemIcon/6486.png","options":["DEX +1"],"description":"","categoryName":"Cincin","parent":"Aksesori"}];
const PARENTS = ['all','Senjata','Pelindung Tubuh','Aksesori','Lainnya'];
let savedView = 'grid';
try{ savedView = localStorage.getItem('lc_item_view') || 'grid'; }catch(e){}
let favorites = [];
try{ favorites = JSON.parse(localStorage.getItem('lc_item_favorites') || '[]'); }catch(e){ favorites = []; }
function saveFavorites(){ try{ localStorage.setItem('lc_item_favorites', JSON.stringify(favorites)); }catch(e){} }
function isFav(id){ return favorites.includes(id); }
function toggleFav(id){
  if(isFav(id)) favorites = favorites.filter(x=>x!==id);
  else favorites.push(id);
  saveFavorites();
}
const els = {
  searchBox: document.getElementById('searchBox'),
  q: document.getElementById('q'),
  clearBtn: document.getElementById('clearBtn'),
  subFilter: document.getElementById('subFilter'),
  favBtn: document.getElementById('favBtn'),
  viewBtn: document.getElementById('viewBtn'),
  chips: document.getElementById('chips'),
  stats: document.getElementById('stats'),
  count: document.getElementById('count'),
  empty: document.getElementById('empty'),
  grid: document.getElementById('grid'),
  modal: document.getElementById('modal'),
  sheetTitle: document.getElementById('sheetTitle'),
  closeModal: document.getElementById('closeModal'),
  detailText: document.getElementById('detailText'),
  copyDetail: document.getElementById('copyDetail'),
  favDetail: document.getElementById('favDetail'),
  toast: document.getElementById('toast')
};
const state = {
  items: [],
  query: '',
  parent: 'all',
  sub: 'all',
  onlyFav: false,
  view: savedView,
  selected: null
};
function safe(v){ return (v ?? '').toString(); }
function esc(v){ return safe(v).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function getEffects(item){ return (item.options && item.options.length) ? item.options.join(' • ') : '-'; }
function haystack(item){ return [item.name,item.name2,item.description,item.categoryName,item.parent,(item.options||[]).join(' ')].map(safe).join(' ').toLowerCase(); }
async function loadItems(){
  state.items = Array.isArray(EMBEDDED_ITEMS) ? EMBEDDED_ITEMS : [];
  if(!state.items.length){
    try{
      const res = await fetch('items-full.json', {cache:'no-store'});
      if(!res.ok) throw new Error('json not found');
      const json = await res.json();
      state.items = Array.isArray(json) ? json : [];
    }catch(e){ state.items = []; }
  }
  state.items = state.items.map((it,i)=>({...it, _id:i, _hay:''})).map(it=>({...it,_hay:haystack(it)})).sort((a,b)=>a.name.localeCompare(b.name));
  initUI(); render();
}
function initUI(){
  PARENTS.forEach(p=>{ const b=document.createElement('button'); b.className='chip'+(p==='all'?' active':''); b.textContent=p==='all'?'Semua':p; b.dataset.parent=p; b.onclick=()=>{ state.parent=p; document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.parent===p)); updateSubOptions(); render(); }; els.chips.appendChild(b); });
  updateSubOptions();
  els.viewBtn.textContent = state.view === 'list' ? '☰' : '▦';
  els.q.addEventListener('input',()=>{ state.query=els.q.value.trim().toLowerCase(); els.searchBox.classList.toggle('has-value',!!state.query); render(); });
  els.clearBtn.onclick=()=>{ els.q.value=''; state.query=''; els.searchBox.classList.remove('has-value'); els.q.focus(); render(); };
  els.subFilter.onchange=()=>{ state.sub=els.subFilter.value; render(); };
  els.favBtn.onclick=()=>{ state.onlyFav=!state.onlyFav; els.favBtn.classList.toggle('active',state.onlyFav); els.favBtn.textContent = state.onlyFav ? '★' : '☆'; render(); };
  els.viewBtn.onclick=()=>{ state.view = state.view === 'grid' ? 'list' : 'grid'; try{localStorage.setItem('lc_item_view',state.view);}catch(e){} els.viewBtn.textContent = state.view === 'list' ? '☰' : '▦'; render(); };
  els.closeModal.onclick=closeModal; els.modal.addEventListener('click',e=>{ if(e.target===els.modal) closeModal(); }); document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
  els.copyDetail.onclick=async()=>{ if(!state.selected) return; await copyText(formatItem(state.selected)); toast('Detail copied'); };
  els.favDetail.onclick=()=>{ if(!state.selected) return; toggleFav(state.selected._id); updateFavDetailBtn(); render(true); };
}
function updateSubOptions(){
  const subs = [...new Set(state.items.filter(it=>state.parent==='all' || it.parent===state.parent).map(it=>it.categoryName).filter(Boolean))].sort();
  els.subFilter.innerHTML = '<option value="all">Semua Tipe</option>' + subs.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  if(!subs.includes(state.sub)) state.sub = 'all';
  els.subFilter.value = state.sub;
}
function filtered(){ return state.items.filter(it=>{ if(state.parent !== 'all' && it.parent !== state.parent) return false; if(state.sub !== 'all' && it.categoryName !== state.sub) return false; if(state.onlyFav && !isFav(it._id)) return false; if(state.query && !it._hay.includes(state.query)) return false; return true; }); }
function renderStats(list){ const total=state.items.length; const visible=list.length; const catsCount=[...new Set(state.items.map(it=>it.categoryName).filter(Boolean))].length; const favCount=favorites.length; els.stats.innerHTML = `<div class="stat"><b>${total}</b><span>Total item</span></div><div class="stat"><b>${visible}</b><span>Hasil tampil</span></div><div class="stat"><b>${catsCount}</b><span>Tipe item</span></div><div class="stat"><b>${favCount}</b><span>Favorit</span></div>`; }
function render(keepScroll){ const list=filtered(); renderStats(list); els.count.textContent = `${list.length} item ditemukan`; els.empty.classList.toggle('show', list.length===0); els.grid.className = 'grid' + (state.view==='list'?' list':''); els.grid.innerHTML = list.map(card).join(''); els.grid.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openModal(+b.dataset.open)); els.grid.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{ const it=state.items.find(x=>x._id===+b.dataset.copy); copyText(formatItem(it)); toast('Copied'); }); els.grid.querySelectorAll('[data-fav]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); toggleFav(+b.dataset.fav); render(true); }); }
function card(it){ const img=safe(it.image); const fav=isFav(it._id); return `<article class="card"><button class="favstar${fav?' active':''}" data-fav="${it._id}" title="Toggle favorit">${fav?'★':'☆'}</button><div><div class="top"><div class="icon">${img?`<img src="${esc(img)}" alt="${esc(it.name)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fallbackIcon',textContent:'LC'}))">`:`<div class="fallbackIcon">LC</div>`}</div><div class="title"><div class="name" title="${esc(it.name)}">${esc(it.name)}</div><div class="meta"><span class="pill gold">${esc(it.parent||'-')}</span><span class="pill">${esc(it.categoryName||'-')}</span></div></div></div><p class="desc">${esc(it.description || getEffects(it) || 'Tidak ada deskripsi.')}</p><div class="info"><div><small>Kategori</small><span>${esc(it.parent||'-')}</span></div><div><small>Tipe</small><span>${esc(it.categoryName||'-')}</span></div><div><small>Efek</small><span title="${esc(getEffects(it))}">${esc(getEffects(it))}</span></div></div></div><div class="actions"><button class="btn primary" data-open="${it._id}">Detail</button><button class="btn" data-copy="${it._id}">Copy</button></div></article>`; }
function updateFavDetailBtn(){ if(!state.selected) return; const fav=isFav(state.selected._id); els.favDetail.textContent = fav ? '★ Favorit' : '☆ Favorit'; els.favDetail.classList.toggle('primary', fav); }
function openModal(id){ const it=state.items.find(x=>x._id===id); if(!it) return; state.selected=it; const img=safe(it.image); els.sheetTitle.innerHTML = `<div class="icon">${img?`<img src="${esc(img)}" alt="${esc(it.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'fallbackIcon',textContent:'LC'}))">`:`<div class="fallbackIcon">LC</div>`}</div><div><div class="name">${esc(it.name)}</div><div class="meta"><span class="pill gold">${esc(it.parent||'-')}</span><span class="pill">${esc(it.categoryName||'-')}</span></div></div>`; els.detailText.textContent=formatItem(it); updateFavDetailBtn(); els.modal.classList.add('show'); els.modal.setAttribute('aria-hidden','false'); }
function closeModal(){ els.modal.classList.remove('show'); els.modal.setAttribute('aria-hidden','true'); state.selected=null; }
function formatItem(it){
  const lines = [];
  lines.push(it.name);
  if(it.name2) lines.push(`Nama lain: ${it.name2}`);
  lines.push('');
  lines.push(`Kategori: ${it.parent || '-'}`);
  lines.push(`Tipe: ${it.categoryName || '-'}`);
  if(it.description){ lines.push(''); lines.push('Deskripsi:'); lines.push(it.description); }
  if(it.options && it.options.length){ lines.push(''); lines.push('Efek/Opsi:'); it.options.forEach(o=>lines.push(`• ${o}`)); }
  return lines.join('\n').trim();
}
async function copyText(text){ try{ await navigator.clipboard.writeText(text); }catch(e){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); } }
function toast(msg){ els.toast.textContent=msg; els.toast.classList.add('show'); clearTimeout(window.__toast); window.__toast=setTimeout(()=>els.toast.classList.remove('show'),1300); }
loadItems();
</script>
<script>
// Registrasi service worker + auto-update.
// Tanpa ini, update item data baru tidak akan langsung kepakai
// karena browser bisa terus pakai versi cache lama.
if ("serviceWorker" in navigator) {
  let refreshing = false;

  navigator.serviceWorker.register("/sw.js").then(reg => {
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if(!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
          toast('Versi baru tersedia, reload halaman');
          if(reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        }
      });
    });
  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(refreshing) return;
    refreshing = true;
    window.location.reload();
  });
}
</script>
</body>
